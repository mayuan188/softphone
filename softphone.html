<!DOCTYPE html>
<html>
<head>

</head>

<body>
  <h3>Softphone TEST</h3>

  <button onclick="test()">テスト</button>
  <button onclick="incomingCall()">📞 着信テスト</button>

  <script>
    function test() {
      alert("OK");
      console.log("点击成功");
    }

    function incomingCall() {
      console.log("开始执行");

      sforce.opencti.searchAndScreenPop({
        searchParams: "08099998888",
        callType: "INBOUND",
        callback: function(res) {
          console.log("结果:", res);
        }
      });
    }
  </script>
</body>
