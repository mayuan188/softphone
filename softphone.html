<!DOCTYPE html>
<html>
<head>
  <script src="/support/api/61.0/lightning/opencti_min.js"></script>
</head>

<body>
  <h3>MySoftphone Ready ✅</h3>

  <button onclick="incomingCall()">📞 着信テスト</button>
  
  <script>
  function incomingCall() {
    const phone = "08099998888";
  
    sforce.opencti.searchAndScreenPop({
      searchParams: phone,
      callType: "INBOUND",
      deferred: false,
      callback: function(response) {
        console.log("結果:", response);
      }
    });
}
</script>
</body>
</html>
